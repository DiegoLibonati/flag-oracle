services:
  flag-oracle-app:
    build:
      context: ./flag-oracle-app
      dockerfile: Dockerfile.production
    restart: always
    env_file:
      - ./flag-oracle-app/.env
    depends_on:
      - flag-oracle-api
    ports:
      - 3000:8080
    networks:
      - flag-oracle-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  flag-oracle-api:
    build:
      context: ./flag-oracle-api
      dockerfile: Dockerfile.production
    restart: always
    env_file:
      - ./flag-oracle-api/.env
    depends_on:
      flag-oracle-db:
        condition: service_healthy
    expose:
      - 5050:5050
    networks:
      - flag-oracle-net

  flag-oracle-db:
    image: mongo:7.0
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - db-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - flag-oracle-net

volumes:
  db-data:
    driver: local

networks:
  flag-oracle-net:
    name: flag-oracle-net
    driver: bridge
